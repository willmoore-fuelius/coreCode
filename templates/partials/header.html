<!--
templateType: global_partial
label: Site header
-->

<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="m-siteHeader js-siteheader">
	{% module "site_navigation"
		path="../../modules/site_navigation"
	%}
</header>

{% require_js position='footer' %}
<script>
	document.addEventListener('DOMContentLoaded', function() {

		// Sticky header height
		const body = document.body;
		const siteHeader = document.querySelector('.js-siteheader');
		if (siteHeader && !document.documentElement.classList.contains('hs-inline-edit')) {
			let resizeTimeout;
			const setSiteHeader = function() {
				const siteHeaderHeight = siteHeader.offsetHeight;
				body.style.paddingTop = siteHeaderHeight + 'px';
			};

			setSiteHeader();

			window.addEventListener('resize', function() {
				clearTimeout(resizeTimeout);
				resizeTimeout = setTimeout(setSiteHeader, 200);
			});

			window.addEventListener('orientationchange', function() {
				clearTimeout(resizeTimeout);
				resizeTimeout = setTimeout(setSiteHeader, 200);
			});
		}

	});
</script>
{% end_require_js %}
