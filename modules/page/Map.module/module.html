{% if module.scrollid %}
<div id="{{ module.scrollid }}" class="js-module">
	{% endif %}

	<div id="{{ name }}" class="m-map">
		<div class="o-wrapper o-wrapper--module" style="--moduleTopSpacingMobile: {{ module.style.spacing_alignment.spacing.mobile.padding_top }}px; --moduleBottomSpacingMobile: {{ module.style.spacing_alignment.spacing.mobile.padding_bottom }}px; --moduleTopSpacingDesktop: {{ module.style.spacing_alignment.spacing.desktop.padding_top }}px; --moduleBottomSpacingDesktop: {{ module.style.spacing_alignment.spacing.desktop.padding_bottom }}px;">
			<div class="o-container">

				{{ text_helpers.render_heading(module.module_heading, module.enable_module_heading) }}

				<div class="m-map__inner">
					<div id="{{module_id}}_map" class="m-map__map"></div>
				</div>

				{{ link_helper.render_module_footer_cta(module.module_footer_cta, name) }}

			</div>
		</div>
	</div>

	{% if module.scrollid %}
</div>
{% endif %}

{% require_js position='footer' %}

<script>

	function initMap() {
		const mark = { lat: {{ module.coordinates.latitude }}, lng: {{ module.coordinates.longitude }} };
		const settings = {
			center: mark,
			zoom: {{ module.map_options.map_zoom }},
			streetViewControl: {{ not module.map_options.disable_street_view }},
			disableDefaultUI: {{ module.map_options.disable_map_controls }}
		};

		const pinColour = '#ccc';

		const svgMarker = {
			path: "M384 192C384 279.4 267 435 215.7 499.2C203.4 514.5 180.6 514.5 168.3 499.2C116.1 435 0 279.4 0 192C0 85.96 85.96 0 192 0C298 0 384 85.96 384 192H384z",
			scale: 0.1,
			fillColor: pinColour,
			fillOpacity: 1,
			strokeWeight: 0,
			rotation: 0,
			anchor: new google.maps.Point(0, 0)
		};

		const map = new google.maps.Map(document.getElementById('{{module_id}}_map'), settings);
		const marker = new google.maps.Marker({position: mark, map: map, icon: svgMarker, animation: google.maps.Animation.DROP });
	}

	document.addEventListener('DOMContentLoaded', function() {
		const element = document.getElementById('{{ name }}');
		if (!element) return;

		let hasTriggered = false;

		// Use Intersection Observer for lazy loading the map
		const observer = new IntersectionObserver(function(entries) {
			entries.forEach(function(entry) {
				if (entry.isIntersecting && !hasTriggered) {
					hasTriggered = true;

					// Load Google Maps script
					const script = document.createElement('script');
					script.src = '//maps.googleapis.com/maps/api/js?key={{ module.google_api_key }}';
					script.onload = initMap;
					document.head.appendChild(script);

					observer.disconnect();
				}
			});
		}, {
			threshold: 0.5
		});

		observer.observe(element);
	});

</script>

{% end_require_js %}
