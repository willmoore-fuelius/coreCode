<div class="m-siteSearch loading">

    <div class="m-siteSearch__header">

        <h1 class="m-siteSearch__heading">Search results</h1>

        <form class="m-siteSearch__form js-searchForm" action="/{{ site_settings.content_search_results_page_path }}">
            <input type="text" class="m-siteSearch__formInput js-searchInput" name="term" autocomplete="off" aria-label="Search" placeholder="Search term">
            {% if module.search_settings.website_pages %}
            <input type="hidden" name="type" value="SITE_PAGE">
            {% endif %}
            {% if module.search_settings.landing_pages %}
            <input type="hidden" name="type" value="LANDING_PAGE">
            {% endif %}
            {% if module.search_settings.blog_posts %}
            <input type="hidden" name="type" value="BLOG_POST">
            <input type="hidden" name="type" value="LISTING_PAGE">
            {% endif %}
            {% if module.search_settings.knowledge_articles %}
            <input type="hidden" name="type" value="KNOWLEDGE_ARTICLE">
            {% endif %}
            <input type="hidden" name="portalId" value="{{hub_id}}">
            <input type="hidden" name="property" value="title">
            <button type="reset" class="m-siteSearch__formAction m-siteSearch__formAction--clear">
                Reset   
            </button>
            <button type="submit" class="m-siteSearch__formAction m-siteSearch__formAction--submit" title="Clear search field">
                Submit
            </button>
        </form>

        <p class="m-siteSearch__resultCount js-searchResultsCount"></p>

    </div>

    <div class="m-siteSearch__results hs-search-results">
        <template class="hs-search-results__template">
            <li class="m-siteSearch__item" data-jplist-item>
                <section class="m-siteSearch__itemInner">

                    <div class="m-siteSearch__featuredimage hs-search-results__featured-image">
                        <img class="m-siteSearch__image" src="" loading="lazy">
                    </div>

                    <div class="m-siteSearch__content">
                        <h1 class="m-siteSearch__title hs-search-results__title h4">Content Title</h1>
                        <p class="m-siteSearch__description hs-search-results__description">Description</p>
                        <a href="#" class="m-siteSearch__link js-siteSearchLink button">
                            Learn more
                        </a>

                    </div>

                </section>
            </li>
        </template>

        <ul id="hsresults" class="hs-search-results__listing" data-jplist-group="data-group-blog" data-items-per-page="10"></ul>

        <div id="blog-pagination"          
             class="m-pagination"
             data-jplist-control="pagination"
             data-group="data-group-blog"
             data-items-per-page="10"
             data-current-page="0"
             data-name="blog-pagination">

            <nav class="m-pagination" aria-label="Pagination navigation" role="navigation">

                <ul class="m-pagination__links jplist-holder" data-type="pages">
                    <li class="m-pagination__linksitem">
                        <button class="m-pagination__link" data-type="page">{pageNumber}</button>
                    </li>
                </ul>

                <div class="m-pagination__arrows">
                    <button type="button" class="m-pagination__arrow m-pagination__arrow--prev" data-type="prev">
                        {% icon name="chevron-left" style="SOLID" width="12" %}
                        <span class="show-for-sr">Prev</span>                                        </button>
                    <button type="button" class="m-pagination__arrow m-pagination__arrow--next" data-type="next">
                        {% icon name="chevron-right" style="SOLID" width="12" %}
                        <span class="show-for-sr">Next</span>
                    </button>        

                </div>

            </nav>

        </div> 
    </div>
